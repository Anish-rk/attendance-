<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Attendance Request</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Existing CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <nav class="navbar" id="navbar">
      <div class="container d-flex justify-content-between">
        <span id="logo"><span>A</span>ttendance</span>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Back</a>
      </div>
    </nav>

    <!-- REQUEST FORM -->
    <div class="page">
      <div class="login-card">
        <h3 class="text-center mb-3">Attendance Request</h3>

        <p id="subject" class="text-muted mb-3"></p>

        <textarea
          id="reason"
          class="form-control mb-3"
          placeholder="Enter reason"
          rows="4"
        ></textarea>

        <button class="btn btn-warning w-100" onclick="send()">
          Submit Request
        </button>
      </div>
    </div>

    <!-- FOOTER -->
    <footer id="footer">
      <h4><span>A</span>ttendance</h4>
      <p>Request Panel</p>
    </footer>

    <script>
      const subject = new URLSearchParams(location.search).get("subject");
      document.getElementById("subject").innerText = subject;

      function send() {
        fetch("/api/request", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            studentId: sessionStorage.getItem("studentId"),
            subject,
            reason: reason.value,
            date: new Date().toLocaleDateString(),
          }),
        }).then(() => {
          alert("Request sent");
          location.href = "index.html";
        });
      }
    </script>
  </body>
</html>
