<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Class Timetable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>


<!-- ================= NAVBAR ================= -->
      <nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
      <a class="navbar-brand" id="logo"><span>T</span>eacher Panel</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Student</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="teacher.html">Go Back</a>
          </li>

         
       
      </div>
    </div>
  </nav>


<!-- ================= PAGE CONTENT ================= -->
<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR (MATCHING TEACHER PAGE) -->
    <div class="col-md-3 col-lg-2 bg-light vh-100 p-3">
      <h6 class="fw-bold mb-4">Navigation</h6>

      <a href="approve.html" class="btn btn-outline-warning w-100 mb-3">
        Approve Requests
      </a>

      <a href="timetable.html" class="btn btn-outline-secondary w-100 mb-3 active">
        Class Timetable
      </a>

      <a href="absent.html" class="btn btn-outline-danger w-100">
        Absent Students
      </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9 col-lg-10 p-4">

      <h4 class="text-center mb-4">Class Timetable</h4>

      <table class="table table-bordered text-center">
        <thead class="table-secondary">
          <tr>
            <th>Period</th>
            <th>Subject</th>
          </tr>
        </thead>
        <tbody id="timetableBody"></tbody>
      </table>

      <!-- Start / Stop Buttons -->
      <div class="text-center mt-4">
        <button id="startBtn" class="btn btn-success me-3">
          Start Attendance
        </button>
        <button id="stopBtn" class="btn btn-danger">
          Stop Attendance
        </button>
      </div>

      <div
        id="statusMsg"
        class="text-center mt-3 fw-bold text-danger"
      ></div>

    </div>
  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>
  if (!sessionStorage.getItem("teacherLogged")) {
    location.href = "teacher.html";
  }

  function logout() {
    sessionStorage.clear();
    location.href = "teacher.html";
  }

  const timetableData = [
    { period: "1", subject: "Artificial Intelligence" },
    { period: "2", subject: "Cloud Computing" },
    { period: "3", subject: "Machine Learning" },
    { period: "4", subject: "Artificial Intelligence Lab" },
    { period: "5", subject: "Database Management System" }
  ];

  const body = document.getElementById("timetableBody");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const statusMsg = document.getElementById("statusMsg");

  timetableData.forEach(t => {
    body.innerHTML += `
      <tr>
        <td>${t.period}</td>
        <td>${t.subject}</td>
      </tr>`;
  });

  function setStatus(status) {
    sessionStorage.setItem("attendanceActive", status);

    if (status === "started") {
      statusMsg.textContent = "";
      startBtn.disabled = true;
      stopBtn.disabled = false;
    } else {
      statusMsg.textContent = "Attendance time has ended.";
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }
  }

  startBtn.onclick = () => {
    setStatus("started");
    alert("Attendance has started");
  };

  stopBtn.onclick = () => {
    setStatus("stopped");
    alert("Attendance has stopped");
  };

  // Restore state
  const currentStatus = sessionStorage.getItem("attendanceActive");
  setStatus(currentStatus === "started" ? "started" : "stopped");
</script>

</body>
</html>
