<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Class Timetable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg" id="navbar">
  <div class="container">
    <a class="navbar-brand" id="logo"><span>T</span>eacher Panel</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Student</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="teacher.html">Go Back</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 bg-light vh-100 p-3">
      <h6 class="fw-bold mb-4">Navigation</h6>

      <a href="approve.html" class="btn btn-outline-warning w-100 mb-3">
        Approve Requests
      </a>

      <a href="timetable.html" class="btn btn-outline-secondary w-100 mb-3 active">
        Class Timetable
      </a>

      <a href="absent.html" class="btn btn-outline-danger w-100">
        Absent Students
      </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9 col-lg-10 p-4">

      <h4 class="text-center mb-4">Class Timetable</h4>

      <table class="table table-bordered text-center">
        <thead class="table-secondary">
          <tr>
            <th>Period</th>
            <th>Subject</th>
          </tr>
        </thead>
        <tbody id="timetableBody"></tbody>
      </table>

      <!-- Start / Stop Buttons -->
      <div class="text-center mt-4">
        <button id="startBtn" class="btn btn-success me-3">
          Start Attendance
        </button>
        <button id="stopBtn" class="btn btn-danger">
          Stop Attendance
        </button>
      </div>

      <div id="statusMsg"
        class="text-center mt-3 fw-bold text-danger">
      </div>

    </div>
  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>

  // Protect page
  if (!sessionStorage.getItem("teacherLogged")) {
    location.href = "teacher.html";
  }

  // Timetable Data
  const timetableData = [
    { period: "1", subject: "Artificial Intelligence" },
    { period: "2", subject: "Cloud Computing" },
    { period: "3", subject: "Machine Learning" },
    { period: "4", subject: "Artificial Intelligence Lab" },
    { period: "5", subject: "Database Management System" }
  ];

  const body = document.getElementById("timetableBody");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const statusMsg = document.getElementById("statusMsg");

  // 🔥 LOAD TABLE PROPERLY
  timetableData.forEach(t => {
    body.innerHTML += `
      <tr>
        <td>${t.period}</td>
        <td>${t.subject}</td>
      </tr>`;
  });

  // 🔥 UPDATE UI BASED ON STATUS
  function updateUI(active) {
    if (active) {
      statusMsg.textContent = "Attendance is Active";
      startBtn.disabled = true;
      stopBtn.disabled = false;
    } else {
      statusMsg.textContent = "Attendance time has ended.";
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }
  }

  // 🔥 START BUTTON
  startBtn.onclick = async () => {
    await fetch("/api/attendance/status", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "started" })
    });

    updateUI(true);
    alert("Attendance has started");
  };

  // 🔥 STOP BUTTON
  stopBtn.onclick = async () => {
    await fetch("/api/attendance/status", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "stopped" })
    });

    updateUI(false);
    alert("Attendance has stopped");
  };

  // 🔥 LOAD CURRENT STATUS FROM SERVER
  fetch("/api/attendance/status")
    .then(r => r.json())
    .then(data => updateUI(data.active));

</script>

</body>
</html>
