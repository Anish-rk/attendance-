<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Absent Students</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-light">

<nav class="navbar bg-danger">
  <div class="container-fluid">
    <span class="navbar-brand text-white fw-bold">
      Absent Students
    </span>
    <a href="teacher.html" class="btn btn-light btn-sm">Back</a>
  </div>
</nav>

<div class="container mt-4">
  <h5 class="text-center mb-3">
    Students Who Have Not Marked Attendance
  </h5>

  <table class="table table-bordered text-center">
    <thead class="table-secondary">
      <tr>
        <th>Student ID</th>
      </tr>
    </thead>
    <tbody id="absentBody"></tbody>
  </table>

  <div
    id="emptyMsg"
    class="text-center text-success fw-bold mt-3"
  ></div>
</div>

<script>
  // Protect page
  if (!sessionStorage.getItem("teacherLogged")) {
    location.href = "teacher.html";
  }

  // SAME student ID pattern as your system
  const TOTAL_STUDENTS = Array.from(
    { length: 60 },
    (_, i) => `S${i + 1}`
  );

  async function loadAbsentStudents() {
    const res = await fetch("/api/attendance");
    const attendanceData = await res.json();

    /*
      ✅ FINAL FIX:
      Only consider students PRESENT if:
      status === "Present" OR status === "Approved"
    */
    const presentStudents = new Set(
      attendanceData
        .filter(a =>
          a.status === "Present" ||
          a.status === "Approved"
        )
        .map(a => a.studentId)
    );

    const absentStudents = TOTAL_STUDENTS.filter(
      id => !presentStudents.has(id)
    );

    const body = document.getElementById("absentBody");
    const emptyMsg = document.getElementById("emptyMsg");

    body.innerHTML = "";
    emptyMsg.textContent = "";

    if (absentStudents.length === 0) {
      emptyMsg.textContent = "All students are present ✅";
      return;
    }

    absentStudents.forEach(id => {
      body.innerHTML += `<tr><td>${id}</td></tr>`;
    });
  }

  // Load fresh data
  loadAbsentStudents();

  // Auto refresh every 8 seconds (safe)
  setInterval(loadAbsentStudents, 8000);
</script>

</body>
</html>
