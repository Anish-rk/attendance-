<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teacher Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

 <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg" id="navbar">
      <div class="container">
        <a class="navbar-brand" id="logo"><span>T</span>eacher Login</a>

        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Student</a>
            </li>
            <button
        id="logoutBtn"
        class="btn btn-danger btn-sm"
        style="display:none"
        onclick="teacherLogout()"
      >
        Logout
      </button>
          </ul>
        </div>
      </div>
    </nav>
    
    
  
<!-- LOGIN -->
<section id="teacherLoginSection" class="page">
  <div class="login-card">
    <h3 class="text-center mb-3">Teacher Login</h3>
    <input id="teacherName" class="form-control mb-2" placeholder="Teacher Name" />
    <span id="teacherNameError" class="text-danger"></span>
    <input id="teacherPassword" type="password" class="form-control mt-3" placeholder="Password" />
    <span id="teacherError" class="text-danger"></span>
    <button class="btn btn-warning w-100 mt-3" onclick="teacherLogin()">Login</button>
  </div>
</section>



<!-- DASHBOARD -->
<section id="teacherDashboard" style="display:none">
  <div class="container-fluid">
    <div class="row">

      <!-- SIDEBAR -->
      <div class="col-md-3 col-lg-2 bg-light vh-100 p-3">
        <h6 class="fw-bold mb-4">Navigation</h6>

        <a href="approve.html" class="btn btn-outline-warning w-100 mb-3">
          Approve Requests
        </a>

        <a href="timetable.html" class="btn btn-outline-secondary w-100 mb-3">
          Class Timetable
        </a>

        <a href="absent.html" class="btn btn-outline-danger w-100">
          Absent Students
        </a>
      </div>

      <!-- MAIN CONTENT -->
      <div class="col-md-9 col-lg-10 p-4">
        <h5 class="mb-3">Welcome, <span id="teacherDisplay"></span></h5>

        <h4 class="text-center mb-4">Attendance Records</h4>

        <table class="table table-bordered text-center">
          <thead class="table-warning">
            <tr>
              <th>Student ID</th>
              <th>Subject</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendanceTable"></tbody>
        </table>

        <div class="mt-5">
          <h5 class="text-center mb-3">Attendance Summary</h5>
          <canvas id="attendanceChart" height="300"></canvas>
        </div>

      </div>
    </div>
  </div>
</section>

 <!-- FOOTER -->
    <footer id="footer">
      <h4><span>A</span>ttendance</h4>
      <p>records panel</p>
    </footer>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let attendanceChart;

function teacherLogin() {
  if (teacherPassword.value !== "admin@123") {
    teacherError.textContent = "Invalid password";
    return;
  }
  sessionStorage.setItem("teacherLogged", "yes");
  sessionStorage.setItem("teacherName", teacherName.value);

  teacherLoginSection.style.display = "none";
  teacherDashboard.style.display = "block";
  logoutBtn.style.display = "inline-block";
  teacherDisplay.textContent = teacherName.value;

  loadTeacherData();
  setTimeout(loadAttendanceChart, 100);
}

function teacherLogout() {
  sessionStorage.clear();
  location.reload();
}

function loadTeacherData() {
  fetch("/api/attendance")
    .then(r => r.json())
    .then(data => {
      attendanceTable.innerHTML = data.map(a => `
        <tr>
          <td>${a.studentId}</td>
          <td>${a.subject}</td>
          <td>${a.date}</td>
          <td>${a.status}</td>
        </tr>
      `).join("");
    });
}

function loadAttendanceChart() {
  fetch("/api/attendance")
    .then(r => r.json())
    .then(data => {
      const present = new Set(data.map(d => d.studentId)).size;
      const total = 60;

      if (attendanceChart) attendanceChart.destroy();

      attendanceChart = new Chart(attendanceChart = document.getElementById("attendanceChart"), {
        type: "doughnut",
        data: {
          labels: ["Present", "Absent"],
          datasets: [{
            data: [present, total - present],
            backgroundColor: ["#ffc107", "#dc3545"]
          }]
        }
      });
    });
}

window.onload = () => {
  if (sessionStorage.getItem("teacherLogged")) {
    teacherLoginSection.style.display = "none";
    teacherDashboard.style.display = "block";
    logoutBtn.style.display = "inline-block";
    teacherDisplay.textContent = sessionStorage.getItem("teacherName");
    loadTeacherData();
    setTimeout(loadAttendanceChart, 100);
  }
};
</script>

</body>
</html>
