<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance System</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ================= NAVBAR ================= -->
  <nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
      <a class="navbar-brand" id="logo"><span>A</span>ttendance</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active">Student</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="teacher.html">Teacher</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ================= LOGIN ================= -->
  <section class="page" id="loginSection">
    <div class="login-card">
      <h3 class="text-center mb-4">Student Login</h3>

      <input
        id="studentIdInput"
        class="form-control mb-1"
        placeholder="Student ID"
      />

      <input
        id="passwordInput"
        type="password"
        class="form-control mt-3 mb-1"
        placeholder="Password"
      />

      <button id="loginBtn" class="btn btn-primary w-100 mt-4">
        Login
      </button>
    </div>
  </section>

  <!-- ================= TIMETABLE ================= -->
  <section class="packages" id="timetableSection" style="display: none">
    <div class="container">
      <h3 class="text-center mb-4">Timetable</h3>

      <table class="table table-bordered text-center">
        <thead class="table-warning">
          <tr>
            <th>Period</th>
            <th>Subject</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="timetableBody"></tbody>
      </table>

      <div class="text-center">
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </div>
    </div>
  </section>

  <!-- CAMERA PREVIEW -->
  <video id="video"
         width="400"
         autoplay
         muted
         style="display:none; position:fixed; bottom:20px; right:20px; border:3px solid #ffc107; border-radius:10px;">
  </video>

  <!-- ================= FOOTER ================= -->
  <footer id="footer">
    <h4><span>A</span>ttendance</h4>
    <p>Face Based Attendance</p>
  </footer>

  <!-- ================= SCRIPTS ================= -->

  <!-- ✅ Correct Browser Build of Face API -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- ✅ Then your app -->
  <script src="app.js"></script>

</body>
</html>
